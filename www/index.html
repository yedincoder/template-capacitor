<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banten88 Mobile</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
	<!-- Tambahkan ini buat manggil icon Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

 <!-- HEADER -->
    <header id="Ngapp_Header">
        <div class="header-left">
            <!-- Icon Back -->
            <button class="btn-icon" id="Ngapp_BtnBack" onclick="uiCloseDetail()" style="display: none;"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="logo-container" id="Ngapp_LogoContainer">
                <img src="logo-light.png" id="Ngapp_LogoImg" alt="Banten88">
            </div>
        </div>
        
        <div class="header-right" id="Ngapp_HeaderActionsMain">
            <!-- Icon Search & Theme -->
            <button class="btn-icon" onclick="uiToggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="btn-icon" id="Ngapp_BtnTheme" onclick="uiToggleTheme()"><i class="fa-solid fa-moon"></i></button>
        </div>

        <div class="header-right" id="Ngapp_HeaderActionsRead" style="display: none;">
            <!-- Icon Bookmark & Share -->
            <button class="btn-icon" id="Ngapp_BtnBookmark" onclick="toggleBookmark()"><i class="fa-regular fa-bookmark"></i></button>
            <button class="btn-icon" onclick="shareArticle()"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
    </header>

    <div id="Ngapp_SearchBar" class="search-bar">
        <input type="text" id="Ngapp_SearchInput" placeholder="Cari berita..." onkeypress="handleSearch(event)">
        <button onclick="executeSearch()">Cari</button>
    </div>

    <div id="Ngapp_Overlay" onclick="uiCloseMenu()"></div>
<nav id="Ngapp_Sidebar">
        <div class="sidebar-header">
            <img src="logo-light.png" alt="Banten88" id="Ngapp_SidebarLogo" style="height: 28px;">
            <button class="btn-icon" onclick="uiCloseMenu()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul class="sidebar-menu" id="Ngapp_SidebarMenu"></ul>
        <div class="sidebar-footer" id="Ngapp_SidebarFooter">
            </div>
    </nav>

    <main id="Ngapp_MainSlot">
        <section id="Ngapp_HeadlineSection">
            <h2 class="section-title">🔥 Headline</h2>
            <div class="slider-container" id="Ngapp_HeadlineSlot"></div>
        </section>

        <section id="Ngapp_EditorSection" style="display: none;">
            <h2 class="section-title">⭐ Pilihan Editor</h2>
            <div class="grid-container" id="Ngapp_EditorSlot"></div>
        </section>

        <section id="Ngapp_ListSection">
            <h2 class="section-title" id="Ngapp_ListTitle">Berita Terbaru</h2>
            <div class="list-container" id="Ngapp_ListSlot"></div>
        </section>
    </main>

    <div id="Ngapp_DetailSlot"></div>

<!-- BOTTOM BAR -->
    <nav id="Ngapp_BottomBar" class="bottom-bar">
        <button class="nav-item active" onclick="navToHome(this)">
            <span class="icon"><i class="fa-solid fa-house"></i></span>
            <span class="label">Beranda</span>
        </button>
        <button class="nav-item" onclick="navToTrending(this)">
            <span class="icon"><i class="fa-solid fa-fire"></i></span>
            <span class="label">Trending</span>
        </button>
        <button class="nav-item" onclick="navToEditorial(this)">
            <span class="icon"><i class="fa-solid fa-star"></i></span>
            <span class="label">Editorial</span>
        </button>
        <button class="nav-item" onclick="navToMenu(this)">
            <span class="icon"><i class="fa-solid fa-bars"></i></span>
            <span class="label">Menu</span>
        </button>
    </nav>

    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
